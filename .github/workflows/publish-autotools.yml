name: publish autotools

on:
  workflow_dispatch:

jobs:

  check:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - id:  check-if-build
        run: |
          set -ex

          cat > QUERY <<EOF
          {
            repository(owner: "leleliu008", name: "autotools") {
                latestRelease {
                  name
                }
            }
          }
          EOF

          LATEST_RELEASE_VERSION="$(gh api graphql -f "query=$(cat QUERY)" --jq .data.repository.latestRelease.name)"

          RELEASE_VERSION="$(date +%Y.%m.%d)"

          if [ "$LATEST_RELEASE_VERSION" = "$RELEASE_VERSION" ] ; then
              RELEASE=no
          else
              RELEASE=yes
          fi

          printf 'RELEASE=%s\n' "$RELEASE" >> "$GITHUB_OUTPUT"
          printf 'RELEASE_VERSION=%s\n' "$RELEASE_VERSION" >> "$GITHUB_OUTPUT"


    outputs:
      if-new-release:  ${{ steps.check-if-build.outputs.RELEASE }}
      release-version: ${{ steps.check-if-build.outputs.RELEASE_VERSION }}



  dragonflybsd:
    needs: check
    if: needs.check.outputs.if-new-release == 'yes'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target-version: ['6.4']

    steps:
      - uses: actions/checkout@v4

      - uses: vmactions/dragonflybsd-vm@v1
        with:
          release: "${{ matrix.target-version }}.0"
          usesh: true
          sync: rsync
          copyback: true
          run: ./pack.sh ${{ needs.check.outputs.release-version }} dragonflybsd-${{ matrix.target-version }}-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: autotools-${{ needs.check.outputs.release-version }}-dragonflybsd-${{ matrix.target-version }}-x86_64.tar.xz
          path: autotools-${{ needs.check.outputs.release-version }}-dragonflybsd-${{ matrix.target-version }}-x86_64.tar.xz


  freebsd:
    needs: check
    if: needs.check.outputs.if-new-release == 'yes'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target-version: ['15.0', '14.3', '14.2', '14.1', '14.0', '13.5', '13.4', '13.3', '13.2']

    steps:
      - uses: actions/checkout@v4

      - uses: cross-platform-actions/action@master
        with:
          operating_system: freebsd
          version: ${{ matrix.target-version }}
          shell: bash
          run: ./pack.sh ${{ needs.check.outputs.release-version }} freebsd-${{ matrix.target-version }}-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: autotools-${{ needs.check.outputs.release-version }}-freebsd-${{ matrix.target-version }}-amd64.tar.xz
          path: autotools-${{ needs.check.outputs.release-version }}-freebsd-${{ matrix.target-version }}-amd64.tar.xz


  openbsd:
    needs: check
    if: needs.check.outputs.if-new-release == 'yes'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target-version: ['7.8', '7.7', '7.6', '7.5', '7.4', '7.3', '7.2']

    steps:
      - uses: actions/checkout@v4

      - uses: cross-platform-actions/action@master
        with:
          operating_system: openbsd
          version: ${{ matrix.target-version }}
          shell: bash
          run: ./pack.sh ${{ needs.check.outputs.release-version }} openbsd-${{ matrix.target-version }}-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: autotools-${{ needs.check.outputs.release-version }}-openbsd-${{ matrix.target-version }}-amd64.tar.xz
          path: autotools-${{ needs.check.outputs.release-version }}-openbsd-${{ matrix.target-version }}-amd64.tar.xz

  netbsd:
    needs: check
    if: needs.check.outputs.if-new-release == 'yes'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target-version: ['10.1', '10.0', '9.4', '9.3', '9.2']

    steps:
      - uses: actions/checkout@v4

      - run: curl -LO https://curl.se/ca/cacert.pem

      - uses: cross-platform-actions/action@master
        with:
          operating_system: netbsd
          version: ${{ matrix.target-version }}
          shell: bash
          run: ./pack.sh ${{ needs.check.outputs.release-version }} netbsd-${{ matrix.target-version }}-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: autotools-${{ needs.check.outputs.release-version }}-netbsd-${{ matrix.target-version }}-amd64.tar.xz
          path: autotools-${{ needs.check.outputs.release-version }}-netbsd-${{ matrix.target-version }}-amd64.tar.xz


  macos:
    needs: check
    if: needs.check.outputs.if-new-release == 'yes'

    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        target-arch: [x86_64, arm64]
        target-version: ['10.15', '11.0', '12.0', '13.0', '14.0', '15.0', '26.0']

    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.target-version }}

    steps:
      - uses: actions/checkout@v4

      - run: ./pack.sh    ${{ needs.check.outputs.release-version }} macos-${{ matrix.target-version }}-${{ matrix.target-arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: autotools-${{ needs.check.outputs.release-version }}-macos-${{ matrix.target-version }}-${{ matrix.target-arch }}.tar.xz
          path: autotools-${{ needs.check.outputs.release-version }}-macos-${{ matrix.target-version }}-${{ matrix.target-arch }}.tar.xz


  linux:
    needs: check
    if: needs.check.outputs.if-new-release == 'yes'

    strategy:
      fail-fast: false
      matrix:
        target-arch: [x86_64, aarch64, ppc64le, riscv64, s390x, armhf]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          case ${{ matrix.target-arch }} in
            x86_64)  X=amd64 ;;
            aarch64) X=arm64 ;;
            ppc64le) X=ppc64el ;;
            *)       X=${{ matrix.target-arch }}
          esac
          set -ex
          curl -LO https://cdimage.ubuntu.com/ubuntu-base/releases/24.04/release/ubuntu-base-24.04.4-base-$X.tar.gz

      - run: install -d ubuntu-rootfs
      - run: tar xf ubuntu-base-24.04.4-base-*.tar.gz -C ubuntu-rootfs

      - run: cp -p /etc/resolv.conf ubuntu-rootfs/etc/
      - run: cp *.sh ubuntu-rootfs/

      - run: sudo mount -o bind  /dev ubuntu-rootfs/dev
      - run: sudo mount -t proc  none ubuntu-rootfs/proc
      - run: sudo mount -t sysfs none ubuntu-rootfs/sys
      - run: sudo mount -t tmpfs none ubuntu-rootfs/tmp

      - run: sudo apt-get -y update
      - run: sudo apt-get -y install qemu-user-static binfmt-support

      - run: update-binfmts --enable

      - run: sudo install -g `id -g` -o `id -u` /usr/bin/qemu-${{ matrix.target-arch }}-static ubuntu-rootfs/

      - run: sudo chroot ubuntu-rootfs /qemu-${{ matrix.target-arch }}-static /bin/sh pack.sh ${{ needs.check.outputs.release-version }} linux-any-${{ matrix.target-arch }}

      - run: mv ubuntu-rootfs/autotools-${{ needs.check.outputs.release-version }}-linux-any-${{ matrix.target-arch }}.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: autotools-${{ needs.check.outputs.release-version }}-linux-any-${{ matrix.target-arch }}.tar.xz
          path: autotools-${{ needs.check.outputs.release-version }}-linux-any-${{ matrix.target-arch }}.tar.xz


  publish:
    needs: [check, dragonflybsd, freebsd, openbsd, netbsd, macos, linux]
    if: needs.check.outputs.if-new-release == 'yes'

    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: .
          merge-multiple: true

      - run: ls -a

      - run: |
          cat > notes.md <<EOF
          ## how to install

          \`\`\`bash
          sudo install -d -g \`id -g\` -o \`id -u\` /opt/autotools
          tar xPf autotools-${{ needs.check.outputs.release-version }}-linux-x86_64.tar.xz
          export PATH="/opt/autotools/bin:\$PATH"
          \`\`\`

          ## included softwares

          \`\`\`yaml
          EOF

          tar xf autotools-${{ needs.check.outputs.release-version }}-linux-glibc-x86_64.tar.xz

          for fp in opt/autotools-${{ needs.check.outputs.release-version }}-linux-glibc-x86_64/*.yml
          do
              fn=${fp##*/}
              PKGNAME=${fn%.yml}

              SRC_URL="$(sed -n '/^src-url: /p' "$fp")"
              SRC_SHA="$(sed -n '/^src-sha: /p' "$fp")"

              cat >> notes.md <<EOF

          $PKGNAME:
              $SRC_URL
              $SRC_SHA
          EOF
          done

          # to avaid: failed to run git: fatal: not a git repository (or any of the parent directories): .git
          git -c init.defaultBranch=master init
          git remote add origin ${{ github.repositoryUrl }}

          TAGNAME=${{ needs.check.outputs.release-version }}

          gh release create "$TAGNAME" *.tar.xz --title "$TAGNAME" --notes-file notes.md
